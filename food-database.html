<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Explorer - FitTrack</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .filter-bar {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--glass-border);
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .filter-btn {
            background: none;
            border: 1px solid rgba(150,150,150,0.2);
            color: var(--text-light);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all var(--transition);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .food-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .food-category-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .tag-protein { background: rgba(110, 86, 207, 0.1); color: hsl(250, 80%, 65%); }
        .tag-fruits { background: rgba(233, 30, 99, 0.1); color: hsl(340, 80%, 60%); }
        .tag-carbs { background: rgba(245, 166, 35, 0.1); color: hsl(35, 90%, 55%); }
        .tag-healthy { background: rgba(29, 185, 84, 0.1); color: hsl(150, 70%, 45%); }

        .food-name {
            font-size: 1.25rem;
            font-family: var(--font-heading);
            margin-bottom: 6px;
            padding-right: 70px; /* space for tag */
        }

        .food-calories {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .food-benefit {
            color: var(--text-light);
            font-size: 0.9rem;
            flex: 1;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .food-goal-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .goal-tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 4px;
            background: var(--bg-color);
            border: 1px solid rgba(150,150,150,0.1);
        }

        .goal-tag i {
            margin-right: 4px;
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 90%;
            max-width: 500px;
            position: relative;
            transform: translateY(20px);
            transition: transform var(--transition);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--glass-border);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--danger);
        }

        .search-input {
            width: 100%;
            max-width: 300px;
            margin-bottom: 0;
        }

    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <a href="dashboard.html" class="brand">
                <i class="fa-solid fa-heart-pulse brand-icon"></i>
                <span>FitTrack</span>
            </a>
            
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
                <a href="food-log.html" class="menu-item">
                    <i class="fa-solid fa-utensils"></i>
                    <span>Food Log</span>
                </a>
                <a href="workout-log.html" class="menu-item">
                    <i class="fa-solid fa-dumbbell"></i>
                    <span>Workouts</span>
                </a>
                <a href="progress.html" class="menu-item">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Progress</span>
                </a>
                <a href="diet-plan.html" class="menu-item">
                    <i class="fa-solid fa-leaf"></i>
                    <span>Diet Plans</span>
                </a>
                <a href="workout-plan.html" class="menu-item">
                    <i class="fa-solid fa-person-running"></i>
                    <span>Routines</span>
                </a>
                <a href="bmi-calculator.html" class="menu-item">
                    <i class="fa-solid fa-calculator"></i>
                    <span>BMI Calculator</span>
                </a>
                <a href="food-database.html" class="menu-item active">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Food Explorer</span>
                </a>
            </nav>

            <div style="margin-top: auto;">
                <a href="profile.html" class="menu-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                <a href="#" class="menu-item logout" onclick="api.logout()">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header animate-fade-in-up">
                <div class="page-title">
                    <h1>Food Explorer 🥑</h1>
                    <p>Discover nutritional benefits and align foods with your goals.</p>
                </div>
                <div class="header-actions">
                    <button type="button" class="theme-toggle" id="themeToggle">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <div class="profile-dropdown" onclick="window.location.href='profile.html'">
                        <div class="avatar" id="userAvatar">U</div>
                    </div>
                </div>
            </header>

            <div class="filter-bar animate-fade-in-up" style="animation-delay: 0.1s;">
                <input type="text" id="searchInput" class="form-control search-input" placeholder="Search foods... (e.g., Avocado)">
                
                <div class="filter-group">
                    <span style="font-size: 0.9rem; color: var(--text-light); font-weight: 500;">Category:</span>
                    <button class="filter-btn active" data-category="all">All</button>
                    <button class="filter-btn" data-category="protein">Protein</button>
                    <button class="filter-btn" data-category="carbs">Carbs</button>
                    <button class="filter-btn" data-category="fruits">Fruits & Veg</button>
                    <button class="filter-btn" data-category="healthy">Healthy Fats</button>
                </div>

                <div class="filter-group" style="margin-left: auto;">
                    <span style="font-size: 0.9rem; color: var(--text-light); font-weight: 500;">Filter by Goal:</span>
                    <button class="filter-btn" data-goal="loss">Wt. Loss</button>
                    <button class="filter-btn" data-goal="gain">Wt. Gain</button>
                </div>
            </div>

            <div class="food-grid" id="foodGrid">
                <!-- Javascript will populate this -->
            </div>
        </main>
    </div>

    <!-- Modal for details -->
    <div class="modal-overlay" id="foodModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/food-database.js"></script>
</body>
</html>
