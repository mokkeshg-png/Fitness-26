<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FitTrack</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card wide animate-fade-in-up">
            <a href="index.html" class="auth-brand">
                <i class="fa-solid fa-heart-pulse"></i> FitTrack
            </a>
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join FitTrack to start your personalized fitness journey.</p>
            </div>
            
            <form id="registerForm">
                <div class="form-row">
                    <!-- Column 1 -->
                    <div>
                        <div class="form-group">
                            <label class="form-label" for="fullName">Full Name</label>
                            <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">Email Address</label>
                            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                            <div class="error-text" id="emailError">Please enter a valid email</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password">Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                                <button type="button" class="password-toggle" tabindex="-1">
                                    <i class="fa-regular fa-eye"></i>
                                </button>
                            </div>
                            <div class="error-text" id="passwordError">Min 8 chars, 1 uppercase, 1 number, 1 special char</div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="confirmPassword">Confirm Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="error-text" id="confirmError">Passwords do not match</div>
                        </div>
                    </div>

                    <!-- Column 2 -->
                    <div>
                        <div class="form-group">
                            <label class="form-label" for="height">Height (cm)</label>
                            <input type="number" id="height" class="form-control" placeholder="175" min="100" max="250" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="weight">Weight (kg)</label>
                            <input type="number" id="weight" class="form-control" placeholder="70" step="0.1" min="30" max="300" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="fitnessGoal">Fitness Goal</label>
                            <select id="fitnessGoal" class="form-control" required>
                                <option value="" disabled selected>Select your goal</option>
                                <option value="weight_loss">Weight Loss</option>
                                <option value="maintain">Maintain Weight</option>
                                <option value="weight_gain">Weight Gain / Muscle Building</option>
                            </select>
                        </div>

                        <div class="form-check" style="margin-top: 32px;">
                            <label class="form-check-label" style="display: flex; align-items: flex-start; gap: 12px; cursor: pointer;">
                                <input type="checkbox" id="terms" class="form-check-input" required style="margin-top: 4px;">
                                <span>I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>.</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div style="text-align: center; margin-top: 32px;">
                    <button type="submit" class="btn btn-primary btn-block" id="registerBtn" style="max-width: 300px; margin: 0 auto;">
                        Create Account <i class="fa-solid fa-user-plus"></i>
                    </button>
                    <div class="auth-links">
                        Already have an account? <a href="login.html">Log In</a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
