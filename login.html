<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FitTrack</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animate-fade-in-up">
            <a href="index.html" class="auth-brand">
                <i class="fa-solid fa-heart-pulse"></i> FitTrack
            </a>
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Log in to track your fitness journey.</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    <div class="error-text" id="emailError">Please enter a valid email</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" tabindex="-1">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-check" style="justify-content: space-between;">
                    <label class="form-check-label" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="remember" class="form-check-input">
                        Remember me
                    </label>
                    <a href="#" style="font-size: 0.9rem;">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                    Login <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="auth-links">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
