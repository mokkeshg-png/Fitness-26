<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Log - FitTrack</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .split-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .log-form-panel {
            background: var(--surface);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .food-table {
            width: 100%;
            border-collapse: collapse;
        }

        .food-table th {
            text-align: left;
            padding: 16px;
            border-bottom: 2px solid rgba(150, 150, 150, 0.1);
            color: var(--text-light);
            font-weight: 500;
        }

        .food-table td {
            padding: 16px;
            border-bottom: 1px solid rgba(150, 150, 150, 0.1);
        }

        .action-cell button {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .action-cell button:hover {
            background: rgba(220, 53, 69, 0.1);
        }

        @media (max-width: 900px) {
            .split-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar-container">
            <!-- Inject through JS or duplicate. I'll duplicate here to keep files independent for local raw viewing -->
            <a href="dashboard.html" class="brand">
                <i class="fa-solid fa-heart-pulse brand-icon"></i>
                <span>FitTrack</span>
            </a>
            
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
                <a href="food-log.html" class="menu-item active">
                    <i class="fa-solid fa-utensils"></i>
                    <span>Food Log</span>
                </a>
                <a href="workout-log.html" class="menu-item">
                    <i class="fa-solid fa-dumbbell"></i>
                    <span>Workouts</span>
                </a>
                <a href="progress.html" class="menu-item">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Progress</span>
                </a>
                <a href="diet-plan.html" class="menu-item">
                    <i class="fa-solid fa-leaf"></i>
                    <span>Diet Plans</span>
                </a>
                <a href="workout-plan.html" class="menu-item">
                    <i class="fa-solid fa-person-running"></i>
                    <span>Routines</span>
                </a>
                <a href="bmi-calculator.html" class="menu-item">
                    <i class="fa-solid fa-calculator"></i>
                    <span>BMI Calculator</span>
                </a>
                <a href="food-database.html" class="menu-item">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Food Explorer</span>
                </a>
            </nav>

            <div style="margin-top: auto;">
                <a href="profile.html" class="menu-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                <a href="#" class="menu-item logout" onclick="api.logout()">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header animate-fade-in-up">
                <div class="page-title">
                    <h1>Food Log 🥗</h1>
                    <p>Track your daily meals to stay on top of your nutrition.</p>
                </div>
                <div class="header-actions">
                    <input type="date" id="logDate" class="form-control" style="width: auto;">
                    <button type="button" class="theme-toggle" id="themeToggle">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <div class="profile-dropdown" onclick="window.location.href='profile.html'">
                        <div class="avatar" id="userAvatar">U</div>
                    </div>
                </div>
            </header>

            <div class="split-layout">
                <!-- Log Form -->
                <div class="log-form-panel animate-fade-in-up" style="animation-delay: 0.1s;">
                    <h3 style="margin-bottom: 24px;">Add New Item</h3>
                    <form id="foodForm">
                        <div class="form-group">
                            <label class="form-label" for="foodName">Food Name</label>
                            <input type="text" id="foodName" class="form-control" placeholder="e.g. Oatmeal with Berries" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="mealType">Meal Type</label>
                            <select id="mealType" class="form-control" required>
                                <option value="breakfast">Breakfast</option>
                                <option value="lunch">Lunch</option>
                                <option value="dinner">Dinner</option>
                                <option value="snack">Snack</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="calories">Calories (kcal)</label>
                            <input type="number" id="calories" class="form-control" placeholder="350" required min="1" max="5000">
                        </div>

                        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 10px;" id="addFoodBtn">
                            <i class="fa-solid fa-plus"></i> Add to Log
                        </button>
                    </form>
                </div>

                <!-- Log History -->
                <div class="glass-panel animate-fade-in-up" style="animation-delay: 0.2s;">
                    <div class="panel-header">
                        <h3>Today's Meals</h3>
                        <span id="dailyTotalCalories" style="font-weight: 700; color: var(--primary);">0 kcal</span>
                    </div>
                    <div style="padding: 0 30px 30px;">
                        <table class="food-table">
                            <thead>
                                <tr>
                                    <th>Food</th>
                                    <th>Meal Type</th>
                                    <th>Calories</th>
                                    <th>Time</th>
                                    <th style="width: 50px;"></th>
                                </tr>
                            </thead>
                            <tbody id="foodTableBody">
                                <!-- Populated through JS -->
                                <tr><td colspan="5" style="text-align: center; color: var(--text-light);">No items logged yet.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/calorie-tracker.js"></script>
</body>
</html>
