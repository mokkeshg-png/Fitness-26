<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress & Analytics - FitTrack</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: var(--surface);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <a href="dashboard.html" class="brand">
                <i class="fa-solid fa-heart-pulse brand-icon"></i>
                <span>FitTrack</span>
            </a>
            
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="fa-solid fa-house"></i>
                    <span>Dashboard</span>
                </a>
                <a href="food-log.html" class="menu-item">
                    <i class="fa-solid fa-utensils"></i>
                    <span>Food Log</span>
                </a>
                <a href="workout-log.html" class="menu-item">
                    <i class="fa-solid fa-dumbbell"></i>
                    <span>Workouts</span>
                </a>
                <a href="progress.html" class="menu-item active">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Progress</span>
                </a>
                <a href="diet-plan.html" class="menu-item">
                    <i class="fa-solid fa-leaf"></i>
                    <span>Diet Plans</span>
                </a>
                <a href="workout-plan.html" class="menu-item">
                    <i class="fa-solid fa-person-running"></i>
                    <span>Routines</span>
                </a>
                <a href="bmi-calculator.html" class="menu-item">
                    <i class="fa-solid fa-calculator"></i>
                    <span>BMI Calculator</span>
                </a>
                <a href="food-database.html" class="menu-item">
                    <i class="fa-solid fa-book-open"></i>
                    <span>Food Explorer</span>
                </a>
            </nav>

            <div style="margin-top: auto;">
                <a href="profile.html" class="menu-item">
                    <i class="fa-solid fa-gear"></i>
                    <span>Settings</span>
                </a>
                <a href="#" class="menu-item logout" onclick="api.logout()">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header animate-fade-in-up">
                <div class="page-title">
                    <h1>Your Progress 📈</h1>
                    <p>Visualize your health data over time.</p>
                </div>
                <div class="header-actions">
                    <select class="form-control" style="width: auto;" id="timeRange">
                        <option value="7">Last 7 Days</option>
                        <option value="30" selected>Last 30 Days</option>
                        <option value="90">Last 3 Months</option>
                    </select>
                    <button type="button" class="theme-toggle" id="themeToggle">
                        <i class="fa-solid fa-moon"></i>
                    </button>
                    <div class="profile-dropdown" onclick="window.location.href='profile.html'">
                        <div class="avatar" id="userAvatar">U</div>
                    </div>
                </div>
            </header>

            <div class="charts-grid">
                <!-- Weight Trend Chart -->
                <div class="chart-card animate-fade-in-up" style="animation-delay: 0.1s;">
                    <div class="chart-header">
                        <h3 class="chart-title">Weight Trend</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="weightChart"></canvas>
                    </div>
                </div>

                <!-- Calorie Intake vs Goal -->
                <div class="chart-card animate-fade-in-up" style="animation-delay: 0.2s;">
                    <div class="chart-header">
                        <h3 class="chart-title">Calorie Intake vs Goal</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="calorieChart"></canvas>
                    </div>
                </div>

                <!-- Macro Distribution -->
                <div class="chart-card animate-fade-in-up" style="animation-delay: 0.3s;">
                    <div class="chart-header">
                        <h3 class="chart-title">Macro Distribution (Average)</h3>
                    </div>
                    <div class="chart-container" style="height: 250px; display: flex; justify-content: center;">
                        <canvas id="macroChart"></canvas>
                    </div>
                </div>

                <!-- Workout Frequency -->
                <div class="chart-card animate-fade-in-up" style="animation-delay: 0.4s;">
                    <div class="chart-header">
                        <h3 class="chart-title">Workout Frequency</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="workoutChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
